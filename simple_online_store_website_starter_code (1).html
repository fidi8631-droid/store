<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRANSEL Streetwear</title>
  <style>
    body { margin:0; font-family: Arial, sans-serif; background:#0a0a0a; color:#fff; }
    header { padding:20px; text-align:center; border-bottom:1px solid #222; }
    header h1 { margin:0; letter-spacing:3px; }

    .container { padding:20px; }

    .admin-panel {
      background:#111;
      padding:15px;
      border-radius:10px;
      margin-bottom:20px;
    }

    input, textarea {
      width:100%;
      padding:10px;
      margin:5px 0;
      border:none;
      border-radius:6px;
    }

    button {
      background:#fff;
      color:#000;
      border:none;
      padding:10px;
      width:100%;
      border-radius:6px;
      cursor:pointer;
      margin-top:5px;
    }

    .products {
      display:grid;
      grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
      gap:20px;
    }

    .product {
      background:#111;
      border-radius:12px;
      padding:15px;
      text-align:center;
    }

    .product img {
      width:100%;
      border-radius:10px;
    }

    .small-btn {
      margin-top:5px;
      background:red;
      color:white;
    }
  </style>
</head>
<body>

<header>
  <h1>GRANSEL</h1>
  <p>Streetwear Store + Admin Panel</p>
</header>

<div class="container">

  <!-- 🔥 ADMIN PANEL -->
  <div class="admin-panel">
    <h3>Admin Panel (Add Product)</h3>
    <input id="name" placeholder="Product Name">
    <input id="price" placeholder="Price (e.g. KSh 2000)">
    <input id="image" placeholder="Image URL">
    <textarea id="desc" placeholder="Description"></textarea>
    <button onclick="addProduct()">Add Product</button>
  </div>

  <!-- PRODUCTS -->
  <div class="products" id="product-list"></div>

</div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [
  {
    name: "BLACKOUT HOODIE",
    price: "KSh 750",
    image: "https://via.placeholder.com/300",
    description: "Heavyweight hoodie. Clean dark aesthetic."
  }
];

function save() {
  localStorage.setItem("products", JSON.stringify(products));
}

function render() {
  const container = document.getElementById("product-list");
  container.innerHTML = "";

  products.forEach((p, index) => {
    const item = document.createElement("div");
    item.className = "product";

    item.innerHTML = `
      <img src="${p.image}" onerror="this.src='https://via.placeholder.com/300'">
      <h3>${p.name}</h3>
      <p>${p.price}</p>
      <p>${p.description}</p>
      <button onclick="order('${p.name}')">Order on WhatsApp</button>
      <button class='small-btn' onclick='removeProduct(${index})'>Delete</button>
    `;

    container.appendChild(item);
  });
}

function addProduct() {
  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const image = document.getElementById("image").value;
  const desc = document.getElementById("desc").value;

  if (!name || !price) return alert("Fill name and price");

  products.push({ name, price, image, description: desc });
  save();
  render();

  document.getElementById("name").value = "";
  document.getElementById("price").value = "";
  document.getElementById("image").value = "";
  document.getElementById("desc").value = "";
}

function removeProduct(index) {
  products.splice(index, 1);
  save();
  render();
}

function order(name) {
  const phone = "254754191235";
  const msg = `Hi, I want to order ${name}`;
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
}

render();
</script>

</body>
</html>
